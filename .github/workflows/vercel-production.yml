name: CI Main Validation

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-main-validation
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  validate-main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate application
        run: |
          npm run lint
          npm run typecheck

      - name: Build application
        run: npm run build

      - name: Publish step summary
        run: |
          echo "## Main Branch Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Checks: lint, typecheck, build" >> $GITHUB_STEP_SUMMARY
          echo "- Deployment: handled by Vercel Git integration" >> $GITHUB_STEP_SUMMARY
        shell: bash
