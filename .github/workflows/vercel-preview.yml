name: CI Branch Validation

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

concurrency:
  group: ci-branch-validation-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  validate-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate application
        run: |
          npm run lint
          npm run typecheck

      - name: Build application
        run: npm run build

      - name: Publish step summary
        run: |
          echo "## Branch Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Checks: lint, typecheck, build" >> $GITHUB_STEP_SUMMARY
          echo "- Preview deployment: handled by Vercel Git integration when connected" >> $GITHUB_STEP_SUMMARY
        shell: bash
